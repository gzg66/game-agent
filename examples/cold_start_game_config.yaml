# ============================================================
# 冷启动探索 - 星途天城(Android fallback) 默认配置
# ============================================================

# ---- 游戏标识 ----
project_name: 星途天城(poco)
engine_type: cocos2dx_js
package_name: com.xttc.release.poco
activity_name: com.xttc.release.poco/org.cocos2dx.javascript.AppActivity

# ---- 设备配置 ----
device:
  uri: "Android:///127.0.0.1:16384"
  serial: 127.0.0.1:16384

# ---- Poco 连接配置 ----
connection:
  host: 127.0.0.1
  port: 5003

# ---- 探索参数 ----
exploration:
  max_steps: 200
  max_pages: 30
  max_actions_per_page: 20
  boot_wait_s: 10.0
  action_wait_s: 2.0
  no_new_page_limit: 10

# ---- 安全配置 ----
safety:
  dangerous_keywords:
